<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic v4.5</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #050505; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .card {
            background-color: #0d1117; 
            width: 350px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
            border: 1px solid rgba(0, 123, 255, 0.3);
            text-align: center;
            padding: 30px 20px;
        }

        /* Tacho mit Skala */
        .gauge-container {
            position: relative;
            width: 240px;
            height: 150px;
            margin: 0 auto 10px;
        }

        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #161b22; stroke-width: 8; stroke-linecap: round; }
        .gauge-progress {
            fill: none;
            stroke: #007bff;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
        }

        /* Skalen-Beschriftung */
        .scale-text {
            font-size: 10px;
            fill: #8b949e;
            font-weight: bold;
        }

        .results-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 15px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-item { flex: 1; text-align: center; }
        .speed-value { font-size: 1.4rem; font-weight: bold; display: block; }
        .unit { font-size: 0.65rem; color: #8b949e; font-weight: 500; }

        .ping-text { color: #f1c40f; } 
        .down-text { color: #007bff; } 
        .up-text { color: #2ecc71; }   

        .info-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 10px;
            height: 40px;
            border-radius: 8px;
            font-size: 0.8rem;
            background-color: #161b22;
            color: #007bff;
            border: 1px solid rgba(0, 123, 255, 0.15);
        }

        .btn-action {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .btn-action:disabled { background-color: #30363d; color: #8b949e; cursor: wait; }
        .label { margin-right: 8px; color: #8b949e; }
        .value { font-family: monospace; }
    </style>
</head>
<body>

    <div class="card">
        <div class="gauge-container">
            <svg class="gauge-svg" viewBox="0 0 200 140">
                <path class="gauge-bg" d="M30,110 A75,75 0 0,1 170,110" />
                <path id="progress-bar" class="gauge-progress" d="M30,110 A75,75 0 0,1 170,110" />
                
                <text x="25" y="125" class="scale-text">0</text>
                <text x="15" y="85" class="scale-text">1</text>
                <text x="45" y="45" class="scale-text">5</text>
                <text x="95" y="30" class="scale-text">10</text>
                <text x="145" y="45" class="scale-text">20</text>
                <text x="175" y="85" class="scale-text">50</text>
                <text x="165" y="125" class="scale-text">100+</text>
            </svg>
        </div>

        <div class="results-grid">
            <div class="result-item">
                <span id="down-val" class="speed-value down-text">0.0</span>
                <span class="unit">Mbit/s DN</span>
            </div>
            <div class="result-item">
                <span id="up-val" class="speed-value up-text">0.0</span>
                <span class="unit">Mbit/s UP</span>
            </div>
            <div class="result-item">
                <span id="ping-val" class="speed-value ping-text">--</span>
                <span class="unit">ms PING</span>
            </div>
        </div>

        <button id="start-btn" class="info-button btn-action" onclick="runSpeedtest()">
            SPEEDTEST STARTEN
        </button>

        <div class="info-button"><span class="label">SESSION:</span><span id="session-id" class="value">...</span></div>
        <div class="info-button"><span class="label">LOCAL IP:</span><span id="local-ip" class="value">Suche...</span></div>
        <div class="info-button"><span class="label">ROUTER IP:</span><span id="router-ip" class="value">Detecting...</span></div>
        <div class="info-button"><span class="label">PUBLIC IP:</span><span id="public-ip" class="value">Lade...</span></div>
    </div>

    <script>
        function init() {
            document.getElementById('session-id').textContent = Math.random().toString().slice(2, 14);
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('public-ip').textContent = d.ip);

            const pc = new RTCPeerConnection();
            pc.createDataChannel("");
            pc.createOffer().then(o => pc.setLocalDescription(o));
            pc.onicecandidate = (e) => {
                if (e?.candidate) {
                    const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                    if (match) {
                        const ip = match[1];
                        document.getElementById('local-ip').textContent = ip;
                        const parts = ip.split('.');
                        document.getElementById('router-ip').textContent = `${parts[0]}.${parts[1]}.${parts[2]}.1`;
                    }
                }
            };
        }

        async function runSpeedtest() {
            const btn = document.getElementById('start-btn');
            const prog = document.getElementById('progress-bar');
            const pV = document.getElementById('ping-val'), dV = document.getElementById('down-val'), uV = document.getElementById('up-val');

            btn.disabled = true;
            btn.textContent = "TEST LÄUFT...";
            prog.style.strokeDashoffset = "283";
            pV.textContent = "--";

            // 1. DOWNLOAD (Blau)
            prog.style.stroke = "#007bff";
            const startDown = performance.now();
            try {
                const res = await fetch("https://cachefly.cachefly.net/10mb.test?nc=" + startDown);
                const reader = res.body.getReader();
                let loaded = 0;
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    loaded += value.length;
                    const duration = (performance.now() - startDown) / 1000;
                    const mbps = ((loaded * 8) / 1000000 / duration).toFixed(1);
                    dV.textContent = mbps;
                    prog.style.strokeDashoffset = 283 - (Math.min(mbps, 100) / 100 * 283);
                }
            } catch(e){}

            // 2. UPLOAD (Grün)
            prog.style.stroke = "#2ecc71";
            try {
                const size = 1024 * 1024 * 2; 
                const data = new Uint8Array(size);
                const startUp = performance.now();
                await fetch('https://httpbin.org/post', { method: 'POST', body: data });
                const mbpsUp = ((size * 8) / 1000000 / ((performance.now() - startUp) / 1000)).toFixed(1);
                uV.textContent = mbpsUp;
                prog.style.strokeDashoffset = 283 - (Math.min(mbpsUp, 100) / 100 * 283);
            } catch(e){ uV.textContent = "0.0"; }

            // 3. PING (Gelb) - Gleiche Geschwindigkeit/Logik wie andere Werte
            prog.style.stroke = "#f1c40f";
            let pings = [];
            for(let i=0; i<8; i++) {
                const start = performance.now();
                try {
                    await fetch("https://www.google.com/generate_204", { mode: 'no-cors', cache: 'no-cache' });
                    const currentPing = performance.now() - start;
                    pings.push(currentPing);
                    pV.textContent = Math.round(currentPing);
                    prog.style.strokeDashoffset = 283 - (Math.min(currentPing, 100) / 100 * 283);
                } catch(e) {}
                await new Promise(r => setTimeout(r, 150));
            }
            pV.textContent = Math.round(Math.min(...pings));

            btn.disabled = false;
            btn.textContent = "ERNEUT TESTEN";
        }

        init();
    </script>
</body>
</html>
